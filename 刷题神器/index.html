<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>一建刷题神器 - 完整版 | 法规+管理+精考法规</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span class="logo">📚</span>
            <span class="brand-text">一建刷题神器</span>
        </div>
        <div class="nav-menu">
            <button class="nav-btn active" data-page="home">首页</button>
            <button class="nav-btn" data-page="quiz">刷题</button>
            <button class="nav-btn" data-page="wrong">错题本</button>
            <button class="nav-btn" data-page="stats">统计</button>
        </div>
        <div class="nav-stats">
            <span class="stat-item">已做: <strong id="nav-answered">0</strong></span>
            <span class="stat-item">正确率: <strong id="nav-accuracy">0%</strong></span>
        </div>
    </nav>

    <main class="main-content">
        <!-- 首页 -->
        <div id="home-page" class="page active">
            <div class="hero">
                <h1>🏗️ 一级建造师考试刷题系统</h1>
                <p class="subtitle">完整版 · 共346题 · 助力考试通关</p>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">📋</div>
                    <div class="stat-value" id="home-total">0</div>
                    <div class="stat-label">总题目数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">✅</div>
                    <div class="stat-value" id="home-answered">0</div>
                    <div class="stat-label">已做题数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🎯</div>
                    <div class="stat-value" id="home-accuracy">0%</div>
                    <div class="stat-label">正确率</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">❌</div>
                    <div class="stat-value" id="home-wrong">0</div>
                    <div class="stat-label">错题数</div>
                </div>
            </div>

            <div class="quick-actions">
                <button class="action-btn primary" onclick="app.startQuickQuiz()">
                    <span>🚀</span> 快速开始刷题
                </button>
                <button class="action-btn" onclick="app.startWrongQuiz()">
                    <span>📝</span> 错题重练
                </button>
            </div>

            <div class="category-section">
                <h2>选择分类刷题</h2>
                <div class="category-grid">
                    <div class="category-card" onclick="app.selectCategory('法规')">
                        <div class="category-icon">⚖️</div>
                        <div class="category-name">建设工程法规</div>
                        <div class="category-count" id="count-法规">0 题</div>
                    </div>
                    <div class="category-card" onclick="app.selectCategory('管理')">
                        <div class="category-icon">📊</div>
                        <div class="category-name">建设工程管理</div>
                        <div class="category-count" id="count-管理">0 题</div>
                    </div>
                    <div class="category-card" onclick="app.selectCategory('精考法规')">
                        <div class="category-icon">🎯</div>
                        <div class="category-name">精考速通法规</div>
                        <div class="category-count" id="count-精考法规">0 题</div>
                    </div>
                    <div class="category-card" onclick="app.selectCategory('all')">
                        <div class="category-icon">📚</div>
                        <div class="category-name">全部题目</div>
                        <div class="category-count" id="count-all">0 题</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 刷题页 -->
        <div id="quiz-page" class="page">
            <div class="quiz-header">
                <button class="back-btn" onclick="app.goHome()">← 返回首页</button>
                <div class="quiz-info">
                    <span class="quiz-category" id="quiz-category">全部题目</span>
                    <span class="quiz-progress"><span id="current-num">1</span> / <span id="total-num">0</span></span>
                </div>
                <div class="quiz-mode">
                    <label class="switch">
                        <input type="checkbox" id="auto-next">
                        <span class="switch-text">自动下一题</span>
                    </label>
                </div>
            </div>

            <div class="quiz-container">
                <div class="question-card">
                    <div class="question-type" id="question-type">单选题</div>
                    <div class="question-content" id="question-text">题目加载中...</div>
                    <div class="options-list" id="options-list"></div>
                </div>

                <div class="answer-section" id="answer-section" style="display: none;">
                    <div class="answer-result" id="answer-result"></div>
                    <div class="answer-detail">
                        <div class="correct-answer">
                            <span class="label">正确答案:</span>
                            <span class="value" id="correct-answer"></span>
                        </div>
                        <div class="user-answer">
                            <span class="label">你的答案:</span>
                            <span class="value" id="user-answer"></span>
                        </div>
                    </div>
                    <div class="explanation">
                        <div class="explanation-title">💡 解析 <span class="source-badge" id="source-badge">📚 知识库</span></div>
                        <div class="explanation-content" id="explanation-text"></div>
                        <div class="explanation-source" id="question-source"></div>
                    </div>
                </div>

                <div class="quiz-actions">
                    <button class="btn-secondary" id="prev-btn" onclick="app.prevQuestion()">上一题</button>
                    <button class="btn-primary" id="submit-btn" onclick="app.submitAnswer()">提交答案</button>
                    <button class="btn-secondary" id="next-btn" onclick="app.nextQuestion()">下一题</button>
                </div>
            </div>
        </div>

        <!-- 错题本页 -->
        <div id="wrong-page" class="page">
            <div class="page-header">
                <h2>📝 错题本</h2>
                <button class="action-btn" onclick="app.clearWrongQuestions()">清空错题</button>
            </div>
            <div class="wrong-list" id="wrong-list"></div>
        </div>

        <!-- 统计页 -->
        <div id="stats-page" class="page">
            <div class="stats-dashboard">
                <div class="stats-row">
                    <div class="stat-box">
                        <div class="stat-box-title">📊 总体进度</div>
                        <div class="progress-ring">
                            <svg width="150" height="150">
                                <circle class="progress-bg" cx="75" cy="75" r="65"></circle>
                                <circle class="progress-bar" id="progress-circle" cx="75" cy="75" r="65"></circle>
                            </svg>
                            <div class="progress-text" id="progress-percent">0%</div>
                        </div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-box-title">🎯 正确率</div>
                        <div class="accuracy-display">
                            <div class="accuracy-value" id="stats-accuracy">0%</div>
                            <div class="accuracy-bar">
                                <div class="accuracy-fill" id="accuracy-fill" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="stats-row">
                    <div class="stat-box wide">
                        <div class="stat-box-title">📈 分类统计</div>
                        <div class="category-stats" id="category-stats"></div>
                    </div>
                </div>

                <div class="stats-row">
                    <div class="stat-box wide">
                        <div class="stat-box-title">🕒 最近练习</div>
                        <div class="recent-list" id="recent-list"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="toast" id="toast"></div>

    <!-- 脚本加载顺序：先加载数据，再加载应用 -->
    <script src="questions.js"></script>
    <script src="knowledge.js"></script>
    <script src="app.js"></script>
</body>
</html>
